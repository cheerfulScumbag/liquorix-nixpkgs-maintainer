---
name: Detect Liquorix releases

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  detect:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
      - uses: cachix/install-nix-action@b4b293eae0b79aac8a161bb32925a5508c9cca93  # v31
      - name: Check Nixpkgs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone --depth=1 https://github.com/NixOS/nixpkgs.git nixpkgs
          if [[ ! -f nixpkgs/pkgs/os-specific/linux/kernel/liquorix-kernel.nix ]]; then
            echo "linux_lqx is not present on this Nixpkgs branch; nothing to detect."
            exit 0
          fi
          ./scripts/maintain.py check --nixpkgs nixpkgs --output update.json
          available=$(python3 -c 'import json; print(str(json.load(open("update.json"))["updateAvailable"]).lower())')
          if [[ "$available" != true ]]; then
            exit 0
          fi
          tag=$(python3 -c 'import json; print(json.load(open("update.json"))["tag"])')
          title="Liquorix update available: $tag"
          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          if [[ -z "$existing" ]]; then
            gh issue create \
              --title "$title" \
              --body "The weekly maintenance workflow will prepare and validate this release. Manual dispatch is available for urgent updates."
          fi
